name: Build and Deploy

on:
  push:
    branches: [main, dev]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_IMAGE: 112064333943.dkr.ecr.ap-northeast-1.amazonaws.com/myfirstweb:latest
  ECS_CLUSTER: default
  ECS_SERVICE: myfirstweb-service
  GCP_REGION: asia-east1
  GAR_REPO: asia-east1-docker.pkg.dev/ckc101-13/myfirstweb/myfirstweb
  CLOUD_RUN_SERVICE: myfirstweb

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t app:latest ./first_project

      - name: Test image
        run: |
          docker run -d --name test -p 19191:19191 app:latest
          sleep 5
          curl -f http://localhost:19191/api/status
          docker rm -f test

      - name: Save image
        run: docker save app:latest | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-image
          retention-days: 1
          path: image.tar.gz

  terraform:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Authenticate to GCP (for terraform)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

  deploy-aws:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image

      - name: Load image
        run: docker load < image.tar.gz

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        run: |
          docker tag app:latest ${{ env.ECR_IMAGE }}
          docker push ${{ env.ECR_IMAGE }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ ECS deploy succeeded! Commit: \`${{ github.sha }}\`"
          else
            MSG="❌ ECS deploy failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"$MSG\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

  deploy-gcp:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image

      - name: Load image
        run: docker load < image.tar.gz

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev --quiet

      - name: Push to Artifact Registry
        run: |
          docker tag app:latest ${{ env.GAR_REPO }}:latest
          docker push ${{ env.GAR_REPO }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.GAR_REPO }}:latest \
            --region ${{ env.GCP_REGION }} \
            --port 19191 \
            --allow-unauthenticated

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ GCP deploy succeeded! Cloud Run updated. Commit: \`${{ github.sha }}\`"
          else
            MSG="❌ GCP deploy failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"$MSG\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
