name: Deploy to ECS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: 112064333943.dkr.ecr.ap-northeast-1.amazonaws.com/myfirstweb
  ECS_CLUSTER: default
  ECS_SERVICE: myfirstweb-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::112064333943:role/github-action
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}:latest ./first_project
          docker push ${{ env.ECR_REGISTRY }}:latest

      - name: Deploy to ECS
        run: |
          STATUS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$STATUS" = "ACTIVE" ]; then
            aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment
          else
            aws ecs delete-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force 2>/dev/null || true
            aws ecs create-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service-name ${{ env.ECS_SERVICE }} \
              --task-definition myfirstweb \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration 'awsvpcConfiguration={subnets=[subnet-0c59d82b06c9a5fcb,subnet-0239c75c7dd3f72c8],securityGroups=[sg-042d68e93dbf4c91c],assignPublicIp=ENABLED}'
          fi

      - name: Notify Discord
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"??ECS deploy succeeded! Commit: \`${{ github.sha }}\`\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"??ECS deploy failed! Commit: \`${{ github.sha }}\`. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
