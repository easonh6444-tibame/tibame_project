name: Build and Deploy (Optimized)

on:
  push:
    branches: [main, dev]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REPO: 112064333943.dkr.ecr.ap-northeast-1.amazonaws.com/myfirstweb
  GCP_REGION: asia-east1
  GAR_REPO: asia-east1-docker.pkg.dev/ckc101-13/myfirstweb/myfirstweb

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load image
        uses: docker/build-push-action@v5
        with:
          context: ./first_project
          load: true
          tags: app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          docker run -d --name test -p 19191:19191 app:test
          sleep 5
          curl -f http://localhost:19191/api/status
          docker rm -f test

      - name: Save image for next jobs
        run: docker save app:test | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-image
          retention-days: 1
          path: image.tar.gz

  infra-base:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply (Base)
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve -var="enable_compute=false"

  push-images:
    needs: infra-base
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image

      - name: Load image
        run: docker load < image.tar.gz

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev --quiet

      - name: Push to Registries
        run: |
          # AWS ECR
          docker tag app:test ${{ env.ECR_REPO }}:${{ github.sha }}
          docker tag app:test ${{ env.ECR_REPO }}:latest
          docker push ${{ env.ECR_REPO }}:${{ github.sha }}
          docker push ${{ env.ECR_REPO }}:latest
          
          # GCP GAR
          docker tag app:test ${{ env.GAR_REPO }}:${{ github.sha }}
          docker tag app:test ${{ env.GAR_REPO }}:latest
          docker push ${{ env.GAR_REPO }}:${{ github.sha }}
          docker push ${{ env.GAR_REPO }}:latest

  deploy-compute:
    needs: push-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply (Full Deploy)
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve \
            -var="enable_compute=true" \
            -var="app_image_tag=${{ github.sha }}"

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ Deployment Succeeded! Version: \`${{ github.sha }}\`"
          else
            MSG="❌ Deployment Failed! Check logs."
          fi
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"$MSG\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
